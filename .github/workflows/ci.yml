name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.job_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            job_name: Linux x64
            cc: gcc-14
            cxx: g++-14
          - os: ubuntu-24.04-arm
            job_name: Linux ARM64
            cc: gcc-14
            cxx: g++-14
          - os: macos-15
            job_name: macOS ARM64
          - os: macos-15-intel
            job_name: macOS x64
          - os: windows-2022
            job_name: Windows x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install GCC 14 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14

      - name: Cache xmake dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            ~/.xrepo
          key: ${{ runner.os }}-xmake-${{ hashFiles('**/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-xmake-

      - name: Configure
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            xmake f --tests=y --cc=${{ matrix.cc }} --cxx=${{ matrix.cxx }} --runtimes=c++_static -y
          elif [ "${{ runner.os }}" = "Windows" ]; then
            xmake f --tests=y --runtimes=MTd -y
          else
            xmake f --tests=y -y
          fi

      - name: Build
        run: xmake

      - name: Run tests
        run: xmake run tests
