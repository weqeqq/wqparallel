name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.job_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            job_name: Linux x64
          - os: ubuntu-24.04-arm
            job_name: Linux ARM64
          - os: macos-15
            job_name: macOS ARM64
          - os: macos-15-intel
            job_name: macOS x64
          - os: windows-2022
            job_name: Windows x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install Latest LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh all
          CLANG_VERSION=$(ls /usr/bin/clang-[0-9]* | grep -oP '\d+' | sort -rn | head -n1)
          echo "CLANG_VERSION=$CLANG_VERSION" >> $GITHUB_ENV
          sudo apt-get install -y "libc++-${CLANG_VERSION}-dev" "libc++abi-${CLANG_VERSION}-dev"

      - name: Cache xmake dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            ~/.xrepo
          key: ${{ runner.os }}-xmake-${{ hashFiles('**/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-xmake-

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        env:
          CC: clang-${{ env.CLANG_VERSION }}
          CXX: clang++-${{ env.CLANG_VERSION }}
        run: xmake f --tests=y --runtimes=c++_shared -y

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: xmake f --tests=y -y

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: xmake f --tests=y -y

      - name: Build
        run: xmake

      - name: Run tests
        run: xmake run tests
